# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration
#
# Lines starting with "#" are comments.
# Configuration options are organized into tables and keys.
# See documentation for more information on available options.

[changelog]
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if get_env(name="INCLUDE_DOWNLOAD_LINKS", default="false") == "only" %}
{% set repo = get_env(name="GITHUB_REPOSITORY", default="huoshen80/ReinaManager") %}
{% set clean_version = version | trim_start_matches(pat="v") %}
{% set base_url = "https://github.com/" ~ repo ~ "/releases/download/" ~ version ~ "/" %}
{% set prefix = "ReinaManager_" ~ clean_version %}
---
### 📥 下载地址 (Download)

![Downloads](https://img.shields.io/github/downloads/{{ repo }}/{{ version }}/total)

**Windows** (不支持 Win7)
- [**64位 (x64)**]({{ base_url }}{{ prefix }}_x64_en-US.msi)
- [**ARM64**]({{ base_url }}{{ prefix }}_arm64_en-US.msi)
- [**便携版 (x64)**]({{ base_url }}{{ prefix }}_win_x64-portable.zip)
- [**便携版 (ARM64)**]({{ base_url }}{{ prefix }}_win_arm64-portable.zip)

**Linux**
- [**AppImage (x64)**]({{ base_url }}{{ prefix }}_amd64.AppImage)
- [**Debian/Ubuntu (.deb x64)**]({{ base_url }}{{ prefix }}_amd64.deb)
- [**AppImage (ARM64)**]({{ base_url }}{{ prefix }}_aarch64.AppImage)
- [**Debian/Ubuntu (.deb ARM64)**]({{ base_url }}{{ prefix }}_arm64.deb)

{% else %}
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
{% endif %}
"""
# template for the changelog footer
footer = """
"""
# remove the leading and trailing whitespace from the templates
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits = false
# regex for preprocessing the commit messages
commit_preprocessors = [
  # { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/orhun/git-cliff/issues/${2}))"},
]
# regex for parsing and grouping commits
commit_parsers = [
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^perf", group = "🚀 Performance" },
  { message = "^refactor", group = "🚜 Refactor" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci", group = "⚙️ Miscellaneous Tasks" },
  { body = ".*security", group = "🛡️ Security" },
  { message = "^revert", group = "◀️ Revert" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit_parsers
filter_commits = false
# regex for matching git tags
tag_pattern = "v[0-9].*"
# regex for skipping tags
skip_tags = "beta|alpha"
# regex for ignoring tags
ignore_tags = "rc"
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
